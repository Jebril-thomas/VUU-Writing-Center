<script>
document.addEventListener("DOMContentLoaded", function(){

/* ───────── STATE ───────── */
const S = {
  step:1,
  format:'', type:'',
  date:null, dateStr:'', time:'',
  tutorId:'any', tutorName:'Any Available Tutor'
};

/* ───────── MONTH DATA ───────── */
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

const SLOTS = ['9:00 AM','10:00 AM','11:00 AM','12:00 PM','1:00 PM','2:00 PM','3:00 PM','4:00 PM'];

let calYM = {y:new Date().getFullYear(), m:new Date().getMonth()};

/* ───────── CALENDAR ───────── */

function buildCalendar(){
  const {y,m}=calYM;
  const title=document.getElementById("calTitle");
  const grid=document.getElementById("calDays");

  if(!title || !grid) return;

  title.textContent=MONTHS[m]+" "+y;
  grid.innerHTML="";

  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();

  for(let i=0;i<first;i++){
    const e=document.createElement("div");
    e.className="cal-day empty";
    grid.appendChild(e);
  }

  for(let d=1;d<=days;d++){
    const dt=new Date(y,m,d);
    const el=document.createElement("div");
    el.className="cal-day";
    el.textContent=d;

    el.onclick=()=>{
      S.date=dt;
      S.dateStr=dt.toDateString();
      buildSlots();
      refreshSummary();
    };

    grid.appendChild(el);
  }
}

function shiftMonth(dir){
  calYM.m+=dir;
  if(calYM.m>11){calYM.m=0;calYM.y++}
  if(calYM.m<0){calYM.m=11;calYM.y--}
  buildCalendar();
}

/* ───────── TIME SLOTS ───────── */

function buildSlots(){
  const wrap=document.getElementById("slotSection");
  const cont=document.getElementById("timeSlots");

  if(!wrap || !cont) return;

  wrap.style.display="block";
  cont.innerHTML="";

  SLOTS.forEach(t=>{
    const el=document.createElement("div");
    el.className="time-slot";
    el.textContent=t;

    el.onclick=()=>{
      S.time=t;
      document.querySelectorAll(".time-slot").forEach(e=>e.classList.remove("selected"));
      el.classList.add("selected");
      refreshSummary();
    };

    cont.appendChild(el);
  });
}

/* ───────── FORMAT ───────── */

window.selectFormat=function(el){
  document.querySelectorAll(".format-card").forEach(c=>c.classList.remove("selected"));
  el.classList.add("selected");
  S.format=el.dataset.format;
  refreshSummary();
};

/* ───────── SUMMARY ───────── */

function refreshSummary(){
  const set=(id,val)=>{
    const el=document.getElementById(id);
    if(!el) return;
    el.textContent=val || "Not selected";
  };

  set("bs-format",S.format);
  set("bs-date",S.dateStr);
  set("bs-time",S.time);
}

/* ───────── STEP NAV ───────── */

window.goTo=function(n){
  document.querySelectorAll(".booking-panel").forEach(p=>p.classList.remove("active"));
  const panel=document.getElementById("panel"+n);
  if(panel) panel.classList.add("active");
  S.step=n;
}

/* ───────── SUBMIT ───────── */

window.submitBooking=function(){
  const ref="WC-"+Math.random().toString(36).slice(2,8).toUpperCase();

  document.getElementById("cf-name").textContent=
    document.getElementById("firstName").value+" "+
    document.getElementById("lastName").value;

  document.getElementById("cf-format").textContent=S.format;
  document.getElementById("cf-date").textContent=S.dateStr;
  document.getElementById("cf-time").textContent=S.time;
  document.getElementById("cf-ref").textContent=ref;

  document.querySelectorAll(".booking-panel").forEach(p=>p.classList.remove("active"));
  document.getElementById("panelDone").classList.add("active");
};

/* ───────── INIT ───────── */

buildCalendar();

});
</script>
