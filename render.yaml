services:
  - type: web
    name: vuu-writing-center-api
    env: node
    region: ohio
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: STAFF_EMAIL
        sync: false
      - key: DB_PATH
        value: ./data/writing_center.db
      - key: UPLOADS_PATH
        value: ./uploads
